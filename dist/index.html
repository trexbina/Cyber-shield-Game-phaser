<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SHIELD // Neon Space Defender</title>
    
    <!-- Google Fonts for Orbitron (Cyberpunk sci-fi) and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05050c;
            --panel-bg: rgba(10, 10, 25, 0.6);
            --border-glow: rgba(0, 255, 255, 0.4);
            --cyan-glow: #00ffff;
            --magenta-glow: #ff00ff;
            --neon-green: #39ff14;
            --neon-yellow: #ffff00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(26, 21, 60, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(31, 14, 52, 0.3) 0%, transparent 40%);
        }

        /* Cyberpunk grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(18, 16, 35, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 16, 35, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4),
                0 0 30px rgba(0, 255, 255, 0.2);
            animation: glitch 4s infinite;
        }

        h1 span {
            color: var(--magenta-glow);
            text-shadow: 
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(255, 0, 255, 0.4);
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* Main Game Layout Container */
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 1024px;
            width: 95%;
        }

        /* Outer glow frame for canvas */
        .game-container-frame {
            position: relative;
            background: var(--panel-bg);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.8),
                0 0 30px var(--border-glow);
            padding: 8px;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 4 / 3;
            max-height: 768px;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .game-container-frame:hover {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(0, 255, 255, 0.6),
                0 0 10px rgba(255, 0, 255, 0.2);
        }

        /* The actual game element created by Phaser */
        #game-container {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000000;
        }

        /* Instructions & UI Panels */
        .ui-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.2rem;
            margin-top: 1.5rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.9rem;
        }

        .controls-info {
            display: flex;
            gap: 1.5rem;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .key-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            color: var(--cyan-glow);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .meta-info {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-align: right;
        }

        .meta-info span {
            color: var(--cyan-glow);
        }

        /* Audio Indicator toggle */
        .audio-indicator {
            position: absolute;
            top: -30px;
            right: 10px;
            font-size: 0.75rem;
            font-family: 'Orbitron', sans-serif;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .audio-indicator:hover {
            color: var(--cyan-glow);
        }

        .audio-bar {
            width: 3px;
            height: 12px;
            background: rgba(255,255,255,0.3);
            display: inline-block;
            transition: background 0.3s, height 0.3s;
        }

        .audio-bar.active {
            background: var(--cyan-glow);
            box-shadow: 0 0 5px var(--cyan-glow);
            animation: bounce-audio 0.8s ease-in-out infinite alternate;
        }
        
        .audio-bar:nth-child(2) { animation-delay: 0.15s; }
        .audio-bar:nth-child(3) { animation-delay: 0.3s; }
        .audio-bar:nth-child(4) { animation-delay: 0.45s; }

        @keyframes bounce-audio {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        /* Pulsing neon glitch effect for title */
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.4); }
            50% { text-shadow: 0 0 15px rgba(255, 0, 255, 0.8), 0 0 25px rgba(255, 0, 255, 0.4); }
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Responsive adaptations */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .ui-panel {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .controls-info {
                flex-direction: column;
                gap: 0.6rem;
                align-items: center;
            }
            .meta-info {
                text-align: center;
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/index-B8aPupuJ.js"></script>
</head>
<body>

    <header>
        <h1>Cyber<span>Shield</span></h1>
        <div class="subtitle">Procedural Neon Defender</div>
    </header>

    <div class="game-wrapper">
        <div class="audio-indicator" id="audio-toggle">
            <span>SOUND ENABLED</span>
            <div style="display: flex; align-items: flex-end; gap: 2px; height: 16px;">
                <div class="audio-bar active"></div>
                <div class="audio-bar active"></div>
                <div class="audio-bar active"></div>
                <div class="audio-bar active"></div>
            </div>
        </div>

        <div class="game-container-frame">
            <div id="game-container"></div>
        </div>

        <div class="ui-panel">
            <div class="controls-info">
                <div class="control-item">
                    <span class="key-badge">WASD</span> or <span class="key-badge">▲▼◀▶</span>
                    <span>FLIGHT CONTROL</span>
                </div>
                <div class="control-item">
                    <span class="key-badge">SPACEBAR</span>
                    <span>RAPID PLASMA SHIELD/FIRE</span>
                </div>
            </div>
            <div class="meta-info">
                FRAMEWORK: <span>PHASER 4.1.0</span> // RENDER: <span>WEBGL 2D</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 PHASER GAME STUDIO // ALL RIGHTS RESERVED
    </footer>

    <!-- Main Game Script Entry (Vite will compile this) -->

    <script>
        // Simple DOM audio toggle decoration
        const audioToggle = document.getElementById('audio-toggle');
        let soundOn = true;
        audioToggle.addEventListener('click', () => {
            soundOn = !soundOn;
            audioToggle.querySelector('span').innerText = soundOn ? 'SOUND ENABLED' : 'SOUND MUTED';
            const bars = audioToggle.querySelectorAll('.audio-bar');
            bars.forEach(bar => {
                if (soundOn) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
            
            // Dispatch a custom event that Phaser can listen to!
            window.dispatchEvent(new CustomEvent('toggle-sound', { detail: { soundOn } }));
        });
    </script>
</body>
</html>
